# Conda environment for OpenVLA-OFT training on 8x H100
#
# BEFORE CREATING: verify your CUDA driver version with:
#   nvidia-smi | grep "CUDA Version"
#
# If your cluster runs CUDA 12.2, change every "cu121" → "cu122" and
# "pytorch-cuda=12.1" → "pytorch-cuda=12.2" throughout this file.
# Driver ≥ 525 supports CUDA 12.x. Driver ≥ 545 supports CUDA 12.3.
#
# CREATE:  conda env create -f training_env.yml
# VERIFY:  conda run -n openvla_oft_train python -c "import torch; print(torch.cuda.is_available())"
#
# After creating the env, run the post-install steps in setup_notes.sh

name: openvla_oft_train
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.14
  - pip
  # conda-managed CUDA toolkit (headers/libs); driver comes from host
  - cuda-toolkit=12.1
  - pip:
    # ── PyTorch (wheels must match CUDA exactly) ────────────────────────────
    # For CUDA 12.2 replace cu121 with cu122 in every URL below.
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.2.2+cu121
    - torchvision==0.17.2+cu121
    - torchaudio==2.2.2+cu121

    # ── HuggingFace stack (PINNED — critical) ───────────────────────────────
    # transformers ≥ 4.45 reroutes VLM architectures to AutoModelForImageTextToText
    # internally, which silently breaks OpenVLA-OFT's custom action head.
    # The action head produces wrong-shaped outputs with NO exception raised.
    # Stay at 4.40.2 until the openvla-oft repo explicitly supports a newer version.
    - transformers==4.40.2
    - tokenizers==0.19.1
    - huggingface-hub==0.23.2
    - accelerate==0.28.0
    - peft==0.10.0
    - safetensors==0.4.3

    # ── DeepSpeed (ZeRO-2 training) ─────────────────────────────────────────
    # If DS_BUILD_FUSED_ADAM=1 needed (usually yes on H100 for best perf):
    #   DS_BUILD_FUSED_ADAM=1 pip install deepspeed==0.14.2 --no-binary deepspeed
    - deepspeed==0.14.2

    # ── Flash Attention (2× throughput on H100 — strongly recommended) ──────
    # Must be compiled against your exact torch+CUDA. Use the prebuilt wheel:
    #   pip install flash-attn==2.5.8 --no-build-isolation
    # If that fails, build from source (takes ~20 min):
    #   pip install flash-attn --no-build-isolation
    - flash-attn==2.5.8

    # ── Robotics / simulation ───────────────────────────────────────────────
    # robosuite MUST be exactly 1.4.1 for LIBERO compatibility.
    # Other versions cause silent task-reset failures that look like the
    # policy is bad, not the environment.
    - robosuite==1.4.1
    - mujoco==2.3.7
    - imageio==2.34.1
    - imageio-ffmpeg==0.5.1
    # LIBERO is NOT pip-installable from PyPI — install from git after env creation:
    #   pip install git+https://github.com/Lifelong-Robot-Learning/LIBERO.git@master
    # See setup_notes.sh for the full LIBERO setup sequence.

    # ── Data / vision ───────────────────────────────────────────────────────
    # numpy MUST stay < 2.0. numpy 2.x breaks robosuite, LIBERO, and mujoco
    # Python bindings. This is a hard constraint, not a preference.
    - numpy==1.26.4
    - Pillow==10.3.0
    # use headless variant — no display daemon needed on GPU nodes
    - opencv-python-headless==4.9.0.80
    - einops==0.7.0
    - h5py==3.11.0

    # ── Model utilities ─────────────────────────────────────────────────────
    - timm==0.9.16
    - sentencepiece==0.2.0
    - protobuf==4.25.3

    # ── Training infrastructure ─────────────────────────────────────────────
    - wandb==0.17.0
    - tensorboard==2.17.0
    - tqdm==4.66.4
    - hydra-core==1.3.2
    - omegaconf==2.3.0

    # ── Quantization (step 3, but install now for consistency) ──────────────
    # autoawq-kernels version must match autoawq exactly — mismatches produce
    # a cryptic CUDA kernel mismatch error at inference time.
    - autoawq==0.2.5
    - autoawq-kernels==0.0.6

    # ── Misc ────────────────────────────────────────────────────────────────
    - scipy==1.13.1
    - pyquaternion==0.9.9
    - easydict==1.13
    - pandas==2.0.3
    - matplotlib==3.8.4
